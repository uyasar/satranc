<html lang="tr">
<head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#262421;--s1:#312E2B;--s2:#3D3A36;
  --green:#81B64C;--gd:#6FA33D;--gold:#F6C946;
  --lsq:#EEEED2;--dsq:#769656;
  --txt:#FFFFFF;--muted:#BABABA;--dim:#7A7A7A;
  --bdr:rgba(255,255,255,0.08);--r:10px;--r2:16px;
}
html,body,#root{min-height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--txt);}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--green);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes floatR{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
@keyframes popIn{0%{transform:scale(.84);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes rainbow{0%{color:#FF6B6B}33%{color:#FFE66D}66%{color:#4ECDC4}100%{color:#FF6B6B}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(129,182,76,.3)}50%{box-shadow:0 0 26px rgba(129,182,76,.65)}}
.fadeUp{animation:fadeUp .45s ease both}
.d1{animation-delay:.08s}.d2{animation-delay:.16s}.d3{animation-delay:.24s}.d4{animation-delay:.32s}
.floatY{animation:floatY 4s ease-in-out infinite}
.floatR{animation:floatR 5s ease-in-out infinite}
.popIn{animation:popIn .28s ease both}
.rainbow{animation:rainbow 2.8s linear infinite}
.glow{animation:glow 2.5s ease-in-out infinite}
.btn-green{background:var(--green);color:#fff;border:none;border-radius:var(--r);padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .18s,transform .15s;min-height:44px}
.btn-green:hover{background:var(--gd);transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--bdr);border-radius:var(--r);padding:11px 22px;font-size:14px;cursor:pointer;font-family:inherit;transition:all .18s;min-height:44px}
.btn-ghost:hover{color:var(--txt);border-color:rgba(255,255,255,.22)}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r2);transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(0,0,0,.45)}
.card-kids{border-radius:var(--r2);transition:transform .2s,box-shadow .2s}
.card-kids:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(78,205,196,.22)}
input,select,textarea{font-family:inherit;outline:none}
.sq:hover{filter:brightness(1.12)}
.nav-links{display:flex;align-items:center;gap:4px}
.hamburger{display:none!important}
.mob-menu{display:none;position:absolute;top:60px;left:0;right:0;background:var(--s1);border-bottom:1px solid var(--bdr);padding:10px 14px;flex-direction:column;gap:6px;z-index:200}
.mob-menu.open{display:flex}
.lesson-grid{display:grid;grid-template-columns:260px 1fr;gap:18px;max-width:1200px;margin:0 auto;padding:22px 18px}
.lesson-sidebar{position:sticky;top:68px;height:fit-content}
.puzzle-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:16px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.path-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:768px){
  .nav-links{display:none!important}.hamburger{display:flex!important}
  .lesson-grid{grid-template-columns:1fr;padding:12px;gap:12px}
  .lesson-sidebar{position:static}
  .sidebar-inner{display:flex;flex-direction:row;overflow-x:auto;gap:8px;padding-bottom:4px}
  .sidebar-item{flex-shrink:0;min-width:140px}
  .puzzle-grid{grid-template-columns:1fr}
  .courses-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .feat-grid{grid-template-columns:repeat(2,1fr)}
  .path-grid{grid-template-columns:1fr}
  .dash-grid{grid-template-columns:1fr 1fr}
  .hero-btns{flex-direction:column;align-items:stretch}
  .hero-btns button{width:100%}
  .footer-grid{grid-template-columns:1fr!important}
  .modal-footer{flex-direction:column}
  .modal-footer button{width:100%}
}
@media(max-width:480px){.dash-grid{grid-template-columns:1fr}}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htm@3/dist/htm.js"></script>
<script>
const html = htm.bind(React.createElement);
const { useState, useCallback } = React;

/* ═══════════════ DATA ═══════════════ */
const PS = {wK:'♔',wQ:'♕',wR:'♖',wB:'♗',wN:'♘',wP:'♙',bK:'♚',bQ:'♛',bR:'♜',bB:'♝',bN:'♞',bP:'♟'};
const FILES = ['a','b','c','d','e','f','g','h'];
const RANKS = ['8','7','6','5','4','3','2','1'];
const INIT_POS = {

  a7:'bP',b7:'bP',c7:'bP',d7:'bP',e7:'bP',f7:'bP',g7:'bP',h7:'bP',
  a2:'wP',b2:'wP',c2:'wP',d2:'wP',e2:'wP',f2:'wP',g2:'wP',h2:'wP',
  a1:'wR',b1:'wN',c1:'wB',d1:'wQ',e1:'wK',f1:'wB',g1:'wN',h1:'wR',
};
const COURSES = [
  {id:1,title:'Satranç Temelleri',level:'Başlangıç',target:'adult',emoji:'♟',hours:6,lessons:12,rating:4.9,students:1250,color:'#81B64C',badge:'En Popüler',desc:'Sıfırdan satranç öğrenin. Taşların hareketlerinden temel stratejilere.'},
  {id:2,title:'Açılış Repertuarı',level:'Orta',target:'adult',emoji:'♛',hours:9,lessons:18,rating:4.8,students:890,color:'#F6C946',badge:'Öne Çıkan',desc:'Güçlü açılışları öğrenin ve rakibinizi hazırlıksız yakalayın.'},
  {id:3,title:'Taktik Ustası',level:'İleri',target:'adult',emoji:'♜',hours:12,lessons:24,rating:4.9,students:654,color:'#E06B6B',badge:null,desc:'Kazanan kombinasyonlar, çatallar, bağlamalar ve daha fazlası.'},
  {id:4,title:'Endgame Teknikleri',level:'İleri',target:'adult',emoji:'♔',hours:8,lessons:16,rating:4.7,students:423,color:'#7BBFEA',badge:null,desc:'Oyun sonlarını kazanmayı öğrenin.'},
  {id:5,title:'Mini Satranç Ustası',level:'Başlangıç',target:'kids',emoji:'⭐',hours:5,lessons:10,rating:5.0,students:2100,color:'#FF6B6B',badge:'🏆 En Sevilen',desc:'Çocuklar için eğlenceli ve sevimli satranç dersleri!'},
  {id:6,title:'Küçük Şampiyonlar',level:'Orta',target:'kids',emoji:'🏆',hours:8,lessons:15,rating:4.9,students:1450,color:'#4ECDC4',badge:'🎯 Popüler',desc:'Turnuvalara hazırlan ve şampiyon ol!'},

/* ═══════════════ CHESS BOARD ═══════════════ */
function ChessBoard({ position, kids, puzzle, onSolve }) {
  const [pos,   setPos]   = useState(() => Object.assign({}, position || INIT_POS));
  const [sel,   setSel]   = useState(null);
  const [state, setState] = useState('idle');
  const lSq = kids ? '#FFF5CC' : '#EEEED2';
  const dSq = kids ? '#4ECDC4' : '#769656';

  function click(sq) {
    if (state === 'solved') return;
    if (sel) {
      if (sq === sel) { setSel(null); return; }
      var np = Object.assign({}, pos);
      np[sq] = np[sel]; delete np[sel]; setPos(np);
      if (puzzle) {
        if (puzzle.from === sel && puzzle.to === sq) {
          setState('solved'); if (onSolve) setTimeout(onSolve, 700);
        } else {
          setState('wrong');
          setTimeout(function() { setPos(Object.assign({}, position || INIT_POS)); setState('idle'); }, 900);
        }
      }
      setSel(null);
    } else { if (pos[sq]) setSel(sq); }
  }

  var cells = [];
  RANKS.forEach(function(r, ri) {
    cells.push(html`<div key=${'rl'+r} style=${{display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:kids?'#9B5DE5':'#999',fontWeight:600}}>${r}</div>`);
    FILES.forEach(function(f, fi) {
      var sq = f+r, light = (fi+ri)%2===0, pc = pos[sq], isSel = sel===sq;
      var isHint = puzzle && !isSel && sel===puzzle.from && sq===puzzle.to;
      var bg = light ? lSq : dSq;
      if (isSel) bg = '#F6F669';
      if (isHint) bg = kids ? 'rgba(155,93,229,.5)' : 'rgba(246,201,70,.55)';
      cells.push(html`
        <div key=${sq} className="sq" onClick=${function(){click(sq);}}
          style=${{background:bg,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'background .12s'}}>
          ${pc && html`<span style=${{fontSize:'min(5.2vw,34px)',lineHeight:1,
            color:pc[0]==='w'?'#fff':'#1A1A1A',
            filter:pc[0]==='w'?'drop-shadow(0 1px 3px rgba(0,0,0,.7))':'drop-shadow(0 1px 1px rgba(255,255,255,.12))',
            transform:isSel?'scale(1.18)':'scale(1)',transition:'transform .12s'}}>${PS[pc]}</span>`}
          ${!pc && sel && pos[sel] && html`<div style=${{width:'30%',height:'30%',borderRadius:'50%',background:kids?'rgba(155,93,229,.42)':'rgba(0,0,0,.16)'}}/>`}
        </div>
      `);
    });
  });
  cells.push(html`<div/>`);
  FILES.forEach(function(f) {
    cells.push(html`<div key=${'fl'+f} style=${{display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:kids?'#9B5DE5':'#999',fontWeight:600}}>${f}</div>`);
  });

  return html`
    <div style=${{display:'flex',flexDirection:'column',gap:10,alignItems:'center',width:'100%'}}>
      <div style=${{display:'grid',gridTemplateColumns:'18px repeat(8,1fr)',gridTemplateRows:'repeat(8,1fr) 18px',width:'100%',maxWidth:420,aspectRatio:'9/10',userSelect:'none'}}>
        ${cells}
      </div>
      <div style=${{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
        ${state==='solved' && html`<span style=${{color:'#81B64C',fontWeight:700,fontSize:13}}>✓ Doğru hamle!</span>`}
        ${state==='wrong'  && html`<span style=${{color:'#FF6B6B',fontWeight:700,fontSize:13}}>✗ Tekrar dene!</span>`}
        <button onClick=${function(){setPos(Object.assign({},position||INIT_POS));setSel(null);setState('idle');}}
          className="btn-ghost" style=${{padding:'5px 12px',fontSize:11,minHeight:32}}>↺ Sıfırla</button>
      </div>
    </div>
  `;
}

/* ═══════════════ NAVBAR ═══════════════ */

              style=${{background:'rgba(129,182,76,.12)',border:'1px solid rgba(129,182,76,.3)',color:'#81B64C',
                padding:'7px 13px',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:600,
                display:'flex',alignItems:'center',gap:7,fontFamily:'inherit',minHeight:44}}>
              <span style=${{width:24,height:24,borderRadius:'50%',background:'#81B64C',color:'#fff',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800}}>${user.name[0]}</span>
              ${user.name.split(' ')[0]} ▾
            </button>
            ${drop && html`
              <div className="popIn" style=${{position:'absolute',right:0,top:48,background:'#3D3A36',
                border:'1px solid rgba(255,255,255,.1)',borderRadius:10,padding:6,minWidth:160,zIndex:300}}>
                <button onClick=${function(){nav('dashboard');setDrop(false);}}
                  style=${{display:'block',width:'100%',background:'none',border:'none',color:'#fff',
                    padding:'9px 12px',cursor:'pointer',borderRadius:6,textAlign:'left',fontSize:13,fontFamily:'inherit',minHeight:40}}>📊 İlerleme</button>
                ${user.role==='admin' && html`
                  <button onClick=${function(){nav('admin');setDrop(false);}}
                    style=${{display:'block',width:'100%',background:'none',border:'none',color:'#F6C946',
                      padding:'9px 12px',cursor:'pointer',borderRadius:6,textAlign:'left',fontSize:13,fontFamily:'inherit',minHeight:40}}>⚙️ Yönetim</button>`}
                <hr style=${{border:'none',borderTop:'1px solid rgba(255,255,255,.07)',margin:'4px 0'}}/>
                <button onClick=${function(){onLogout();setDrop(false);}}
                  style=${{display:'block',width:'100%',background:'none',border:'none',color:'#FF6B6B',
                    padding:'9px 12px',cursor:'pointer',borderRadius:6,textAlign:'left',fontSize:13,fontFamily:'inherit',minHeight:40}}>🚪 Çıkış</button>
              </div>`}
          </div>
        ` : html`<button onClick=${function(){nav('login');}} className="btn-green" style=${{marginLeft:6,padding:'8px 18px'}}>Giriş Yap</button>`}
      </div>
      <button className="hamburger" onClick=${function(){setBurger(!burger);}}
        style=${{background:'none',border:'none',color:'#fff',fontSize:22,cursor:'pointer',
          padding:8,minHeight:44,minWidth:44,display:'none',justifyContent:'center',alignItems:'center'}}>
        ${burger ? '✕' : '☰'}
      </button>
      <div className=${`mob-menu${burger?' open':''}`}>
        ${lnk('home','Ana Sayfa')} ${lnk('courses','Kurslar')} ${lnk('kids','Çocuklar 🌟')}
        ${user ? html`
          <span>
            ${lnk('dashboard','📊 İlerleme')}
            ${user.role==='admin' && lnk('admin','⚙️ Yönetim')}
            <button onClick=${function(){onLogout();setBurger(false);}}
              style=${{background:'rgba(255,107,107,.1)',border:'1px solid rgba(255,107,107,.2)',color:'#FF6B6B',
                borderRadius:8,padding:'10px 14px',fontSize:14,cursor:'pointer',
                textAlign:'left',fontFamily:'inherit',minHeight:44,display:'block',width:'100%',marginTop:4}}>🚪 Çıkış</button>
          </span>
        ` : html`<button onClick=${function(){nav('login');setBurger(false);}} className="btn-green">Giriş Yap</button>`}
      </div>
    </nav>
  `;
}

/* ═══════════════ HOME ═══════════════ */

          <h1 style=${{fontFamily:'Playfair Display',fontSize:'clamp(32px,7vw,66px)',fontWeight:900,lineHeight:1.1,marginBottom:18}}>

          <p style=${{color:'#BABABA',fontSize:'clamp(14px,2vw,17px)',lineHeight:1.75,maxWidth:500,margin:'0 auto 30px'}}>

/* ═══════════════ ADMIN ═══════════════ */
function AdminPanel() {
  const [tab,     setTab]     = useState('courses');
  const [courses, setCourses] = useState(COURSES.slice());
  const [lessons, setLessons] = useState(LESSONS.slice());
  const [users,   setUsers]   = useState(INIT_USERS.slice());
  const [modal,   setModal]   = useState(null);
  const [form,    setForm]    = useState({});

  function openAdd(t)    { setForm({}); setModal({type:t,mode:'add'}); }
  function openEdit(t,d) { setForm(Object.assign({},d)); setModal({type:t,mode:'edit'}); }
  function close()       { setModal(null); }

  function save() {
    if (!modal) return;
    var t = modal.type, m = modal.mode;
    if (t==='course') {
      var o = Object.assign({},form,{lessons:+form.lessons||0,hours:+form.hours||0,rating:+form.rating||4.5,students:+form.students||0,emoji:form.emoji||'♟',color:form.color||'#81B64C',target:form.target||'adult'});
      m==='add' ? setCourses(function(p){return p.concat([Object.assign({},o,{id:Date.now()})]);}) : setCourses(function(p){return p.map(function(c){return c.id===form.id?o:c;});});
    } else if (t==='lesson') {
      var o2 = Object.assign({},form,{cid:+form.cid,order:+form.order||1});
      m==='add' ? setLessons(function(p){return p.concat([Object.assign({},o2,{id:Date.now()})]);}) : setLessons(function(p){return p.map(function(l){return l.id===form.id?o2:l;});});
    } else {
      var o3 = Object.assign({},form,{role:form.role||'user',enrolled:form.enrolled||[],progress:+form.progress||0});
      m==='add' ? setUsers(function(p){return p.concat([Object.assign({},o3,{id:Date.now(),join:'Bugün'})]);}) : setUsers(function(p){return p.map(function(u){return u.id===form.id?o3:u;});});
    }
    close();
  }

  function delItem(type, id) {
    if (type==='course') setCourses(function(p){return p.filter(function(c){return c.id!==id;});});
    else if (type==='lesson') setLessons(function(p){return p.filter(function(l){return l.id!==id;});});
    else setUsers(function(p){return p.filter(function(u){return u.id!==id;});});
  }

  function inp(k, ph, t) {
    t = t || 'text';
    return html`<input value=${form[k]||''} onInput=${function(e){setForm(function(p){var n=Object.assign({},p);n[k]=e.target.value;return n;});}}
      placeholder=${ph} type=${t} style=${{background:'var(--s2)',border:'1px solid var(--bdr)',color:'#fff',padding:'10px 12px',borderRadius:8,width:'100%',fontSize:13}}/>`;
  }
  function sel(k, opts) {
    return html`<select value=${form[k]||''} onChange=${function(e){setForm(function(p){var n=Object.assign({},p);n[k]=e.target.value;return n;});}}
      style=${{background:'var(--s2)',border:'1px solid var(--bdr)',color:'#fff',padding:'10px 12px',borderRadius:8,width:'100%',fontSize:13}}>
      <option value=''>Seçin…</option>
      ${opts.map(function(o){ var v=o.v||o, l=o.l||o; return html`<option key=${v} value=${v}>${l}</option>`; })}
    </select>`;
  }

  function TB(t, l) {
    return html`<button onClick=${function(){setTab(t);}}
      style=${{background:tab===t?'rgba(129,182,76,.14)':'transparent',color:tab===t?'#81B64C':'#BABABA',
        border:'1px solid '+(tab===t?'rgba(129,182,76,.3)':'transparent'),padding:'8px 16px',borderRadius:8,
        cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit',minHeight:40}}>${l}</button>`;
  }
  function RB(type, item) {
    var isAdmin = type==='user' && item.role==='admin';
    return html`<div style=${{display:'flex',gap:6,flexShrink:0}}>
      <button onClick=${function(){openEdit(type,item);}} style=${{background:'rgba(123,156,255,.1)',color:'#7B9CFF',border:'1px solid rgba(123,156,255,.2)',padding:'6px 12px',borderRadius:7,cursor:'pointer',fontSize:12,fontFamily:'inherit',minHeight:36}}>Düzenle</button>
      <button onClick=${function(){delItem(type,item.id);}} disabled=${isAdmin}
        style=${{background:isAdmin?'transparent':'rgba(224,107,107,.12)',color:isAdmin?'#444':'#E06B6B',
          border:'1px solid '+(isAdmin?'transparent':'rgba(224,107,107,.25)'),padding:'6px 12px',borderRadius:7,
          cursor:isAdmin?'not-allowed':'pointer',fontSize:12,fontFamily:'inherit',minHeight:36}}>Sil</button>
    </div>`;
  }

  return html`
    <div style=${{maxWidth:1020,margin:'0 auto',padding:'32px 18px'}}>
      <div style=${{marginBottom:24}}>
        <h1 style=${{fontFamily:'Playfair Display',fontSize:'clamp(20px,4vw,30px)',fontWeight:900,marginBottom:3}}>⚙️ Yönetim Paneli</h1>
        <p style=${{color:'#7A7A7A',fontSize:12}}>Kurs, ders ve kullanıcıları buradan yönetin.</p>
      </div>
      <div style=${{display:'flex',gap:5,marginBottom:20,background:'var(--s1)',padding:4,borderRadius:10,width:'fit-content',border:'1px solid var(--bdr)',flexWrap:'wrap'}}>
        ${TB('courses','📚 Kurslar')} ${TB('lessons','♟ Dersler')} ${TB('users','👥 Kullanıcılar')}
      </div>

      ${tab==='courses' && html`
        <div>
          <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:9}}>
            <h2 style=${{fontWeight:700,fontSize:16}}>Kurslar (${courses.length})</h2>
            <button onClick=${function(){openAdd('course');}} className="btn-green" style=${{padding:'8px 16px',fontSize:13}}>+ Yeni Kurs</button>
          </div>
          <div style=${{display:'flex',flexDirection:'column',gap:9}}>
            ${courses.map(function(c){
              return html`<div key=${c.id} style=${{background:'var(--s1)',border:'1px solid var(--bdr)',borderRadius:10,padding:'13px 14px',display:'flex',alignItems:'center',gap:11,flexWrap:'wrap'}}>
                <span style=${{fontSize:24,width:30,textAlign:'center',flexShrink:0}}>${c.emoji}</span>
                <div style=${{flex:1,minWidth:150}}>
                  <div style=${{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap',marginBottom:2}}>
                    <span style=${{fontWeight:600,fontSize:13}}>${c.title}</span>
                    <span style=${{background:c.target==='kids'?'rgba(78,205,196,.12)':'rgba(129,182,76,.1)',color:c.target==='kids'?'#4ECDC4':'#81B64C',padding:'1px 6px',borderRadius:6,fontSize:9,fontWeight:700}}>${c.target==='kids'?'Çocuk':'Yetişkin'}</span>
                  </div>
                  <div style=${{color:'#555',fontSize:11}}>${c.lessons} ders · ${c.hours} saat</div>
                </div>
                ${RB('course',c)}
              </div>`;
            })}
          </div>
        </div>`}

      ${tab==='lessons' && html`
        <div>
          <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:9}}>
            <h2 style=${{fontWeight:700,fontSize:16}}>Dersler (${lessons.length})</h2>
            <button onClick=${function(){openAdd('lesson');}} className="btn-green" style=${{padding:'8px 16px',fontSize:13}}>+ Yeni Ders</button>
          </div>
          <div style=${{display:'flex',flexDirection:'column',gap:9}}>
            ${lessons.map(function(l){
              var c = courses.find(function(x){return x.id===l.cid;});
              return html`<div key=${l.id} style=${{background:'var(--s1)',border:'1px solid var(--bdr)',borderRadius:10,padding:'13px 14px',display:'flex',alignItems:'center',gap:11,flexWrap:'wrap'}}>
                <span style=${{background:l.type==='video'?'rgba(246,201,70,.1)':'rgba(129,182,76,.1)',color:l.type==='video'?'#F6C946':'#81B64C',padding:'3px 7px',borderRadius:5,fontSize:11,fontWeight:700,flexShrink:0}}>${l.type==='video'?'▶ Video':'♟ Pratik'}</span>
                <div style=${{flex:1,minWidth:130}}>
                  <div style=${{fontWeight:600,fontSize:13,marginBottom:1}}>${l.order}. ${l.title}</div>
                  <div style=${{color:'#555',fontSize:11}}>${c?c.title:'?'} · ${l.dur}</div>
                </div>
                ${RB('lesson',l)}
              </div>`;
            })}
          </div>
        </div>`}

      ${tab==='users' && html`
        <div>
          <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:9}}>
            <h2 style=${{fontWeight:700,fontSize:16}}>Kullanıcılar (${users.length})</h2>
            <button onClick=${function(){openAdd('user');}} className="btn-green" style=${{padding:'8px 16px',fontSize:13}}>+ Kullanıcı Ekle</button>
          </div>
          <div style=${{display:'flex',flexDirection:'column',gap:9}}>
            ${users.map(function(u){
              return html`<div key=${u.id} style=${{background:'var(--s1)',border:'1px solid var(--bdr)',borderRadius:10,padding:'13px 14px',display:'flex',alignItems:'center',gap:11,flexWrap:'wrap'}}>
                <div style=${{width:36,height:36,borderRadius:'50%',background:'#81B64C',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:800,color:'#fff',flexShrink:0}}>${u.name[0]}</div>
                <div style=${{flex:1,minWidth:130}}>
                  <div style=${{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap',marginBottom:1}}>
                    <span style=${{fontWeight:600,fontSize:13}}>${u.name}</span>
                    <span style=${{background:u.role==='admin'?'rgba(246,201,70,.12)':'rgba(129,182,76,.1)',color:u.role==='admin'?'#F6C946':'#81B64C',padding:'1px 6px',borderRadius:6,fontSize:9,fontWeight:700}}>${u.role==='admin'?'Admin':'Üye'}</span>
                  </div>
                  <div style=${{color:'#555',fontSize:11}}>${u.email} · %${u.progress}</div>
                </div>
                ${RB('user',u)}
              </div>`;
            })}
          </div>
        </div>`}

      ${modal && html`
        <div style=${{position:'fixed',inset:0,background:'rgba(0,0,0,.78)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:16}}
          onClick=${function(e){if(e.target===e.currentTarget)close();}}>
          <div className="popIn" style=${{background:'#2A2725',border:'1px solid rgba(129,182,76,.2)',borderRadius:16,padding:'24px 20px',width:'min(460px,100%)',maxHeight:'82vh',overflow:'auto'}}>
            <h3 style=${{fontFamily:'Playfair Display',fontSize:18,fontWeight:800,marginBottom:18}}>
              ${modal.mode==='add'?'Yeni':'Düzenle'} ${modal.type==='course'?'Kurs':modal.type==='lesson'?'Ders':'Kullanıcı'}
            </h3>
            <div style=${{display:'flex',flexDirection:'column',gap:9}}>
              ${modal.type==='course' && html`<span>${inp('title','Kurs adı')} ${inp('emoji','Emoji')} ${sel('level',['Başlangıç','Orta','İleri'])} ${sel('target',[{v:'adult',l:'Yetişkin'},{v:'kids',l:'Çocuk'}])} ${inp('lessons','Ders sayısı','number')} ${inp('hours','Saat','number')} ${inp('desc','Açıklama')} ${inp('badge','Rozet (opsiyonel)')}</span>`}
              ${modal.type==='lesson' && html`<span>${inp('title','Ders adı')}
                <select value=${form.cid||''} onChange=${function(e){setForm(function(p){var n=Object.assign({},p);n.cid=e.target.value;return n;});}}
                  style=${{background:'var(--s2)',border:'1px solid var(--bdr)',color:'#fff',padding:'10px 12px',borderRadius:8,width:'100%',fontSize:13}}>
                  <option value=''>Kurs seçin…</option>
                  ${courses.map(function(c){return html`<option key=${c.id} value=${c.id}>${c.title}</option>`;})}
                </select>
                ${sel('type',[{v:'video',l:'Video'},{v:'practice',l:'Pratik'}])} ${inp('dur','Süre (ör: 15 dk)')} ${inp('order','Sıra','number')}</span>`}
              ${modal.type==='user' && html`<span>${inp('name','Ad Soyad')} ${inp('email','E-posta','email')} ${inp('pass','Şifre','password')} ${sel('role',[{v:'user',l:'Üye'},{v:'admin',l:'Admin'}])} ${inp('progress','İlerleme (%)','number')}</span>`}
            </div>
            <div className="modal-footer" style=${{display:'flex',gap:9,marginTop:18,justifyContent:'flex-end'}}>
              <button onClick=${close} className="btn-ghost" style=${{padding:'10px 18px',fontSize:13}}>İptal</button>
              <button onClick=${save} className="btn-green" style=${{padding:'10px 22px',fontSize:13}}>Kaydet</button>
            </div>
          </div>
        </div>`}
    </div>
  `;
}

/* ═══════════════ AUTH ═══════════════ */
function AuthPage({ mode, nav, onLogin }) {
  const [form, setForm] = useState({});
  const [err,  setErr]  = useState('');
  var isLogin = mode === 'login';
  function submit() {
    if (isLogin) {
      var u = INIT_USERS.find(function(u){ return u.email===form.email && u.pass===form.pass; });
      if (u) { onLogin(u); nav('dashboard'); }
      else setErr('Hatalı giriş. Dene: ahmet@mail.com / 1234 veya admin@chess.com / admin123');
    } else {
      if (!form.name||!form.email||!form.pass) { setErr('Tüm alanları doldurun.'); return; }
      onLogin({id:Date.now(),name:form.name,email:form.email,pass:form.pass,role:'user',join:'Bugün',enrolled:[],progress:0});
      nav('dashboard');
    }
  }
  function field(k, lbl, t, ph) {
    return html`<div>
      <label style=${{fontSize:11,color:'#BABABA',marginBottom:5,display:'block'}}>${lbl}</label>
      <input value=${form[k]||''} onInput=${function(e){setForm(function(p){var n=Object.assign({},p);n[k]=e.target.value;return n;});}} placeholder=${ph} type=${t}
        style=${{background:'var(--s2)',border:'1px solid var(--bdr)',color:'#fff',padding:'11px 13px',borderRadius:9,width:'100%',fontSize:14}}/>
    </div>`;
  }
  return html`
    <div style=${{minHeight:'80vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'24px 16px'}}>
      <div className="popIn" style=${{background:'var(--s1)',border:'1px solid rgba(129,182,76,.15)',borderRadius:18,padding:'32px 24px',width:'min(400px,100%)'}}>
        <div style=${{textAlign:'center',marginBottom:26}}>
          <div style=${{fontSize:36,marginBottom:9}}>♟</div>
          <h2 style=${{fontFamily:'Playfair Display',fontSize:22,fontWeight:900,marginBottom:4}}>${isLogin?'Hoş Geldiniz':'Üye Olun'}</h2>
          <p style=${{color:'#7A7A7A',fontSize:12}}>${isLogin?'Hesabınıza giriş yapın':'Satranç yolculuğunuza başlayın'}</p>
        </div>
        <div style=${{display:'flex',flexDirection:'column',gap:11}}>
          ${!isLogin && field('name','Ad Soyad','text','Adınız Soyadınız')}
          ${field('email','E-posta','email','ornek@mail.com')}
          ${field('pass','Şifre','password','••••••••')}
        </div>
        ${err && html`<div style=${{background:'rgba(224,107,107,.1)',border:'1px solid rgba(224,107,107,.25)',color:'#E06B6B',padding:'9px 13px',borderRadius:7,fontSize:12,marginTop:10,lineHeight:1.5}}>${err}</div>`}
        <button onClick=${submit} className="btn-green" style=${{width:'100%',padding:13,fontSize:15,borderRadius:10,marginTop:16}}>
          ${isLogin?'Giriş Yap':'Üye Ol'}
        </button>
        <p style=${{textAlign:'center',color:'#7A7A7A',fontSize:12,marginTop:12}}>
          ${isLogin?'Hesabınız yok mu? ':'Zaten üye misiniz? '}
          <span onClick=${function(){nav(isLogin?'register':'login');setErr('');}} style=${{color:'#81B64C',cursor:'pointer',fontWeight:600}}>${isLogin?'Üye Ol':'Giriş Yap'}</span>
        </p>
      </div>
    </div>
  `;
}

/* ═══════════════ APP ═══════════════ */
function App() {
  const [page,         setPage]         = useState('home');
  const [user,         setUser]         = useState(null);
  const [activeCourse, setActiveCourse] = useState(null);

  var nav = useCallback(function(p) {
    if ((p==='dashboard'||p==='admin') && !user) { setPage('login'); return; }
    if (p==='admin' && (!user || user.role!=='admin')) return;
    setPage(p);
    window.scrollTo({top:0,behavior:'smooth'});
  }, [user]);

  function renderPage() {
    switch(page) {
      case 'home':      return html`<${HomePage} nav=${nav}/>`;
      case 'courses':   return html`<${CoursesPage} nav=${nav} setActiveCourse=${setActiveCourse}/>`;
      case 'kids':      return html`<${KidsPage} nav=${nav} setActiveCourse=${setActiveCourse}/>`;
      case 'lesson':    return activeCourse ? html`<${LessonPage} course=${activeCourse} nav=${nav}/>` : html`<${CoursesPage} nav=${nav} setActiveCourse=${setActiveCourse}/>`;
      case 'dashboard': return html`<${Dashboard} user=${user} nav=${nav}/>`;
      case 'admin':     return html`<${AdminPanel}/>`;
      case 'login':     return html`<${AuthPage} mode="login" nav=${nav} onLogin=${setUser}/>`;
      case 'register':  return html`<${AuthPage} mode="register" nav=${nav} onLogin=${setUser}/>`;
      default:          return html`<${HomePage} nav=${nav}/>`;
    }
  }

  return html`
    <div style=${{minHeight:'100vh',background:'var(--bg)',color:'var(--txt)'}}>
      <${Navbar} page=${page} nav=${nav} user=${user} onLogout=${function(){setUser(null);setPage('home');}}/>
      <main>${renderPage()}</main>
      ${!['admin','login','register'].includes(page) && html`<${Footer}/>`}
    </div>
  `;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
